# This file defines comprehensive parameters and settings for the trading bot.
# Carefully review and adjust values to match your trading strategy and risk tolerance.

# Bot main configuration
main:
    # Enables or disables this bot instance
    enabled: False

    # Bot identification
    # Unique name to identify the bot instance
    name: "bot-trader-1"

    # RPC Endpoint
    # Replace this with a performant Solana RPC provider such as Helius, QuickNode, Triton, or Alchemy if needed
    # Example (Helius): "https://mainnet.helius-rpc.com/?api-key=YOUR_API_KEY"
    rpcendpoint: "https://api.mainnet-beta.solana.com"

    # WSS Endpoint
    # Required for listening to on-chain real-time events (logs, blocks, instructions)
    # Can also be replaced with services like Helius or QuickNode if WebSocket is supported
    # Example (Helius): "wss://mainnet.helius-rpc.com/?api-key=YOUR_API_KEY"
    wssendpoint: "wss://api.mainnet-beta.solana.com"

    # Solana wallet private key
    # IMPORTANT: Use environment variable or secrets manager to keep your key safe
    privkey: "[WALLET-PRIVATE-KEY]"

    # Run in a separate process/thread (recommended for better isolation)
    separate: False

    # When enabled, activates paper trading mode (no real trades)
    sandbox: True

# Filters for token selection
filters:
    # Listener mode: "blocks", "logs" or "geyser" (recommended for low-latency events)
    listener: "blocks"

    # Optional: only trade tokens containing this string in their name/symbol
    matchstring: Null

    # Optional: only trade tokens created by this wallet address
    useraddress: Null

    # If 'True' buy only, skip selling (e.g., for accumulation strategy)
    noshorting: False

    # If 'True' ignore filters and trade continuously
    filteroff: False

# Geyser configuration (fastest method for getting updates)
geyser:
    # Geyser Endpoint
    endpoint: "[GEYSER-ENDPOINT]"

    # Geyser API Token
    apitoken: "[GEYSER-API-TOKEN]"

    # Geyser Auth Type "x-token" or "basic"
    authtype: "x-token"

# Token timing configuration
timing:
    # Max age in seconds (e.g., 0.001 = ~1 ms) for a token to be considered "fresh"
    tokenmaxage: 0.001

    # Token server response timeout
    tokentimeout: 30

# Trading parameters
trade:
    # Amount of SOL to spend per token buy (in SOL)
    buyamount: 0.0001

    # Max allowed slippage (0.3 = 30%) during buy order — protects against bad pricing
    buyslippage: 0.3

    # Max allowed slippage (0.3 = 30%) during sell order — protects against bad pricing
    sellslippage: 0.3

    # If 'True' skip price confirmation and bonding curve delay for faster execution
    fastmode: False

    # Amount of tokens to buy
    fasttokens: 20

    # Stop Loss as a percentage (e.g., -20%) (modifiable)
    stoplosspercent: 20

    # Stop Loss based on target market cap (in USD or equivalent) (modifiable)
    stoplossmarketcap: Null

    # Take Profit as a percentage (e.g., +50%) (modifiable)
    takeprofitpercent: 50

    # Take Profit based on target market cap (in USD or equivalent) (modifiable)
    takeprofitmarketcap: Null

    # Enable or disable trailing stop loss (modifiable)
    trailingstop: True

    # Trigger trailing sell if price drops by this % after a gain (modifiable)
    trailingdrop: 30

# Priority fee configuration
priority:
    # Enable dynamic fee estimation via getRecentPrioritizationFees
    enabledynamic: False

    # Use fixed fee instead (recommended if dynamic fees fail or are too slow)
    enablefixed: True

    # Fixed priority fee in microlamports (1_000_000 = 0.001 SOL)
    baselamports: 1_000_000

    # Percentage increase on riority fee regardless of the calculation method (0.1 = 10%)
    extrapercent: 0.0

    # Maximum allowable fee in microlamports to prevent excessive spending
    hardcap: 1_000_000

# Retry and timeout settings
retries:
    # Number of attempts for transaction submission
    maxattempts: 1
    
    # Seconds to wait after token creation (only if EXTREME FAST is disabled)
    waitaftercreation: 15
    
    # Holding period after buy transaction
    waitafterbuy: 15
    
    # Pause between token trades
    waitnewtoken: 15

# Token and account management
cleanup:
  # Cleanup mode determines when to manage token accounts. Options:
  # "disabled": no cleanup will occur.
  # "on_fail": only clean up if a buy transaction fails.
  # "after_sell": clean up after selling.
  # "post_session": clean up all empty accounts after a trading session ends.
  mode: "post_session"
  
  # Force burning remaining tokens before closing account
  forceburn: False
  
  # Use priority fees for cleanup transactions
  priorityfee: False
  
# Rules
rules:
    # Minimum market capitalization required (in USD or equivalent)
    minmarketcap: 6000

    # Maximum market capitalization required (in USD or equivalent)
    maxmarketcap: 10000

    # Maximum percentage of token supply that the creator/owner is allowed to hold
    maxholdowner: 20

    # Maximum percentage of token supply that the top holder is allowed to hold
    holdertop: 20

    # Minimum number of unique holders required for the token
    minholders: 10

    # Maximum number of unique holders required for the token
    maxholders: 20

    # Enable check for number of addresses holding at least a minimum SOL balance (safety filter)
    checkholders: True

    # Minimum initial liquidity pool size (in USD or equivalent)
    liquiditypool: 4000